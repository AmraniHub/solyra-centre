<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تم الحجز بنجاح — Centre Solyra</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 60%, #f3e5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1a0510;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 52px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 60px rgba(233,30,140,.18);
      border: 1.5px solid rgba(233,30,140,.12);
      animation: pop .5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes pop {
      from { transform: scale(.88); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .check-circle {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #880e4f);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      margin-bottom: 24px;
      box-shadow: 0 6px 28px rgba(233,30,140,.35);
    }
    h1 { font-size: 1.8rem; font-weight: 900; color: #880e4f; margin-bottom: 12px; }
    .sub { font-size: 1rem; color: #7c3a5a; margin-bottom: 28px; line-height: 1.7; }
    .sub strong { color: #e91e8c; }
    .steps {
      background: #fff5f8;
      border-radius: 14px;
      padding: 20px 24px;
      text-align: right;
      margin-bottom: 28px;
      border: 1px solid rgba(233,30,140,.1);
    }
    .steps h3 { font-size: .9rem; font-weight: 700; color: #c2185b; margin-bottom: 12px; }
    .step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: .9rem; color: #7c3a5a; }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #880e4f);
      color: #fff;
      font-size: .75rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      border-radius: 50px;
      padding: 14px 32px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(37,211,102,.4);
      margin-bottom: 14px;
      width: 100%;
      justify-content: center;
    }
    .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,.5); }
    .back-btn {
      display: inline-block;
      color: #c2185b;
      font-size: .88rem;
      font-weight: 600;
      text-decoration: none;
      opacity: .8;
    }
    .back-btn:hover { opacity: 1; }
    .confetti {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }
    .dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      animation: fall linear infinite;
    }
    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="confetti" id="confetti"></div>

<div class="card">
  <div class="check-circle">✅</div>
  <h1>تم استلام طلبك! 🌸</h1>
  <p class="sub">شكراً على ثقتك في <strong>Centre Solyra</strong>.<br>سيتواصل معك فريقنا خلال دقائق لتأكيد موعدك.</p>

  <div class="steps">
    <h3>ماذا يحدث الآن؟</h3>
    <div class="step">
      <span class="step-num">1</span>
      <span>سيتصل بك فريقنا على رقم واتساب للتأكيد</span>
    </div>
    <div class="step">
      <span class="step-num">2</span>
      <span>تأكدي من الموعد والخدمة المطلوبة</span>
    </div>
    <div class="step">
      <span class="step-num">3</span>
      <span>احضري إلينا وانتظري التحول ✨</span>
    </div>
  </div>

  <a class="wa-btn" href="https://wa.me/212619946109?text=السلام%20عليكم%2C%20لقد%20حجزت%20موعداً%20عبر%20الموقع%20وأريد%20التأكيد" target="_blank">
    📱 تواصلي معنا عبر واتساب
  </a>
  <br>
  <a class="back-btn" href="/">← العودة للصفحة الرئيسية</a>
</div>

<script>
  // confetti
  const colors = ['#e91e8c','#f48fb1','#c9922b','#880e4f','#fce4ec'];
  const c = document.getElementById('confetti');
  for (let i = 0; i < 30; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      animation-duration: ${3+Math.random()*4}s;
      animation-delay: ${Math.random()*3}s;
      opacity: ${.4+Math.random()*.6};
    `;
    c.appendChild(d);
  }
</script>
</body>
</html>
